<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Рыцарь 2 | №67 Европы</title>
  
  <!-- Подключение красивого шрифта -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@500;600;700&family=Philosopher:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      font-family: 'Philosopher', 'Montserrat Alternates', 'Segoe UI', system-ui, sans-serif;
    }

    /* Монотонный динамичный фон */
    .background-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(circle at 35% 45%, #1a1a1a 0%, #080808 70%, #020202 100%);
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
      opacity: 0.95;
    }

    /* Центрирование контента */
    .center-content-wrapper {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
      gap: 2rem;
    }

    /* Контейнер для гифки (опциональный) */
    .media-container {
      pointer-events: none;
      max-width: 70vw;
      max-height: 40vh;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.9);
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      position: relative;
    }

    .media-container.active {
      opacity: 1;
      transform: scale(1);
    }

    .media-container.has-gif {
      /* Дополнительные стили когда есть гифка */
    }

    .media-container img {
      max-width: 100%;
      max-height: 40vh;
      object-fit: contain;
      border-radius: 12px;
      filter: drop-shadow(0 0 25px rgba(255, 255, 255, 0.4)) drop-shadow(0 10px 30px rgba(0, 0, 0, 0.8));
      transition: filter 0.3s ease;
    }

    /* Надпись */
    .animated-message {
      pointer-events: auto;
      cursor: pointer;
      font-family: 'Philosopher', 'Montserrat Alternates', sans-serif;
      font-weight: 700;
      font-size: clamp(1.8rem, 6vw, 3.8rem);
      letter-spacing: 0.05em;
      color: #ffffff;
      
      background: transparent;
      backdrop-filter: none;
      padding: 0.6rem 1.5rem;
      border-radius: 0;
      border: none;
      box-shadow: none;
      
      text-shadow: 
        0 0 25px rgba(255, 255, 255, 0.8),
        0 0 50px rgba(255, 255, 255, 0.5),
        0 0 80px rgba(200, 200, 200, 0.4),
        0 0 120px rgba(180, 180, 180, 0.3),
        0 4px 15px rgba(0, 0, 0, 0.7),
        0 8px 30px rgba(0, 0, 0, 0.5);
      
      transition: text-shadow 0.3s ease, transform 0.25s ease;
      user-select: none;
      text-align: center;
      line-height: 1.3;
      white-space: normal;
      word-break: break-word;
      max-width: 85vw;
      will-change: transform, filter, opacity, letter-spacing, text-shadow;
    }

    .animated-message:hover {
      transform: scale(1.04);
      text-shadow: 
        0 0 35px rgba(255, 255, 255, 0.95),
        0 0 65px rgba(255, 255, 255, 0.7),
        0 0 100px rgba(220, 220, 220, 0.5),
        0 0 150px rgba(200, 200, 200, 0.35),
        0 6px 20px rgba(0, 0, 0, 0.8),
        0 10px 35px rgba(0, 0, 0, 0.6);
    }

    /* Анимация для надписи */
    .click-animation {
      animation: elegantWave 0.45s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }

    /* Анимация для медиа */
    .media-animation {
      animation: mediaPulse 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }

    @keyframes elegantWave {
      0% {
        transform: scale(1) rotate(0deg);
        filter: blur(0px) brightness(1);
        opacity: 1;
        letter-spacing: 0.05em;
      }
      15% {
        transform: scale(1.06) rotate(0.8deg);
        filter: blur(1.5px) brightness(1.6);
        opacity: 0.8;
        letter-spacing: 0.12em;
      }
      40% {
        transform: scale(0.93) rotate(-0.4deg);
        filter: blur(0px) brightness(1.15);
        opacity: 1;
        letter-spacing: 0.01em;
      }
      70% {
        transform: scale(1.03) rotate(0.3deg);
        filter: blur(0px) brightness(1.04);
        opacity: 1;
        letter-spacing: 0.07em;
      }
      100% {
        transform: scale(1) rotate(0deg);
        filter: blur(0) brightness(1);
        opacity: 1;
        letter-spacing: 0.05em;
      }
    }

    @keyframes mediaPulse {
      0% {
        transform: scale(0.85);
        filter: blur(3px) brightness(1.8);
        opacity: 0;
      }
      40% {
        transform: scale(1.08);
        filter: blur(0px) brightness(1.2);
        opacity: 1;
      }
      100% {
        transform: scale(1);
        filter: blur(0) brightness(1);
        opacity: 1;
      }
    }

    /* Индикатор звука */
    .sound-indicator {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 20;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
      transition: all 0.3s ease;
      opacity: 0;
      pointer-events: none;
    }

    .sound-indicator.playing {
      opacity: 1;
      animation: soundPulse 0.8s ease-in-out infinite;
    }

    @keyframes soundPulse {
      0%, 100% {
        transform: scale(1);
        background: rgba(255, 255, 255, 0.4);
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
      }
      50% {
        transform: scale(1.8);
        background: rgba(255, 255, 255, 0.8);
        box-shadow: 0 0 25px rgba(255, 255, 255, 0.9);
      }
    }

    @media (max-width: 500px) {
      .animated-message {
        padding: 0.5rem 1rem;
        font-size: clamp(1.5rem, 7vw, 2.5rem);
      }
      
      .media-container {
        max-width: 85vw;
        max-height: 35vh;
      }
      
      .media-container img {
        max-height: 35vh;
      }
      
      .center-content-wrapper {
        gap: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="background-layer"></div>
  <canvas id="monoCanvas"></canvas>

  <div class="center-content-wrapper">
    <!-- Контейнер для гифки (опциональный) -->
    <div class="media-container" id="mediaContainer">
      <img id="mediaImage" src="" alt="" style="display: none;">
    </div>
    
    <!-- Надпись -->
    <div class="animated-message" id="magicText">Свечение</div>
  </div>

  <!-- Индикатор воспроизведения звука -->
  <div class="sound-indicator" id="soundIndicator"></div>

  <!-- Скрытый аудио элемент -->
  <audio id="audioPlayer" preload="auto"></audio>

  <script>
    (function() {
      // ---------- МАССИВ ДАННЫХ (ВСЕ ПОЛЯ ОПЦИОНАЛЬНЫЕ) ----------
      // Формат: { text: "строка", gif: "путь/к/гифке.gif" (опционально), sound: "путь/к/звуку.mp3" (опционально) }
      // Можно указывать только текст, или любую комбинацию полей
      const contentArray = [
        { 
          text: "kristiiina prime",
        },
        { 
          text: "stariy_bog",
        },
        { 
          text: "ueyo lox",
        },
        { 
          text: "67",
        },
        { 
          text: "why so serious",
          gif: "joker.gif",
          sound: "joker.mp3",
        },
      ];

      // DOM элементы
      const textElement = document.getElementById('magicText');
      const mediaContainer = document.getElementById('mediaContainer');
      const mediaImage = document.getElementById('mediaImage');
      const audioPlayer = document.getElementById('audioPlayer');
      const soundIndicator = document.getElementById('soundIndicator');
      
      let lastIndex = -1;
      let currentAudio = null;

      // Функция получения случайного индекса
      function getRandomIndex(length) {
        if (length <= 1) return 0;
        let newIndex;
        do {
          newIndex = Math.floor(Math.random() * length);
        } while (newIndex === lastIndex && length > 1);
        return newIndex;
      }

      // Остановка текущего аудио
      function stopCurrentAudio() {
        if (currentAudio) {
          audioPlayer.pause();
          audioPlayer.currentTime = 0;
          soundIndicator.classList.remove('playing');
          currentAudio = null;
        }
      }

      // Воспроизведение аудио (опционально)
      function playAudio(soundPath) {
        stopCurrentAudio();
        
        // Если звук не указан, просто выходим
        if (!soundPath) {
          soundIndicator.classList.remove('playing');
          return;
        }
        
        audioPlayer.src = soundPath;
        currentAudio = soundPath;
        
        audioPlayer.play().then(() => {
          soundIndicator.classList.add('playing');
        }).catch(error => {
          console.log('Аудио не может быть воспроизведено:', error);
          soundIndicator.classList.remove('playing');
          currentAudio = null;
        });
        
        // Убираем индикатор когда аудио закончится
        audioPlayer.onended = () => {
          soundIndicator.classList.remove('playing');
          currentAudio = null;
        };
      }

      // Обновление медиа (гифка) - опционально
      function updateMedia(gifPath) {
        // Убираем активный класс
        mediaContainer.classList.remove('active');
        
        // Проверяем, есть ли гифка
        if (gifPath) {
          // Есть гифка - показываем контейнер и загружаем изображение
          mediaContainer.style.display = 'flex';
          mediaImage.src = gifPath;
          mediaImage.style.display = 'block';
          
          // Небольшая задержка для анимации появления
          setTimeout(() => {
            mediaContainer.classList.add('active');
            mediaContainer.classList.add('media-animation');
            
            setTimeout(() => {
              mediaContainer.classList.remove('media-animation');
            }, 500);
          }, 50);
        } else {
          // Нет гифки - скрываем контейнер полностью
          mediaImage.style.display = 'none';
          mediaImage.src = '';
          mediaContainer.style.display = 'none';
          mediaContainer.classList.remove('active');
        }
      }

      // Установка контента
      function setContent(item) {
        // Обновляем текст (обязательное поле)
        textElement.textContent = item.text || '...';
        
        // Обновляем медиа (гифку) - опционально
        updateMedia(item.gif || null);
        
        // Воспроизводим звук - опционально
        playAudio(item.sound || null);
      }

      // Показать случайный контент
      function showRandomContent() {
        if (!contentArray.length) {
          textElement.textContent = "···";
          updateMedia(null);
          return;
        }
        
        const newIndex = getRandomIndex(contentArray.length);
        lastIndex = newIndex;
        
        const selectedItem = contentArray[newIndex];
        setContent(selectedItem);
      }

      // Инициализация
      function initializeContent() {
        if (contentArray.length === 0) {
          textElement.textContent = "монохром";
          updateMedia(null);
          return;
        }
        
        const randomStartIndex = Math.floor(Math.random() * contentArray.length);
        lastIndex = randomStartIndex;
        
        const initialItem = contentArray[randomStartIndex];
        setContent(initialItem);
      }

      // Обработчик клика
      function handleTextClick() {
        // Останавливаем текущий звук
        stopCurrentAudio();
        
        // Анимация текста
        textElement.classList.remove('click-animation');
        void textElement.offsetWidth;
        textElement.classList.add('click-animation');
        
        // Меняем контент в середине анимации
        setTimeout(() => {
          showRandomContent();
        }, 80);
        
        // Убираем класс анимации
        setTimeout(() => {
          textElement.classList.remove('click-animation');
        }, 470);
      }

      textElement.addEventListener('click', handleTextClick);

      // ---------- ДИНАМИЧНЫЙ ИНТЕРАКТИВНЫЙ ФОН (Canvas) ----------
      const canvas = document.getElementById('monoCanvas');
      const ctx = canvas.getContext('2d');

      let width, height;
      const particles = [];
      const PARTICLE_COUNT = 150;

      let mouseX = 0, mouseY = 0;
      let targetMouseX = 0, targetMouseY = 0;

      function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        targetMouseX = width / 2;
        targetMouseY = height / 2;
        mouseX = targetMouseX;
        mouseY = targetMouseY;
      }

      function onMouseMove(e) {
        targetMouseX = e.clientX;
        targetMouseY = e.clientY;
      }

      function onTouchMove(e) {
        if (e.touches.length > 0) {
          targetMouseX = e.touches[0].clientX;
          targetMouseY = e.touches[0].clientY;
        }
      }

      function onTouchStart(e) {
        if (e.touches.length > 0) {
          targetMouseX = e.touches[0].clientX;
          targetMouseY = e.touches[0].clientY;
        }
      }

      class Particle {
        constructor() {
          this.reset();
        }

        reset() {
          this.x = Math.random() * width;
          this.y = Math.random() * height;
          this.baseRadius = Math.random() * 2.6 + 1.0;
          this.radius = this.baseRadius;
          this.vx = (Math.random() - 0.5) * 0.8;
          this.vy = (Math.random() - 0.5) * 0.8;
          this.angle = Math.random() * Math.PI * 2;
          this.speedFactor = Math.random() * 0.038 + 0.015;
          this.gray = Math.floor(Math.random() * 100) + 150;
          this.alpha = Math.random() * 0.5 + 0.25;
        }

        update(mx, my, time) {
          const dx = this.x - mx;
          const dy = this.y - my;
          const distToMouse = Math.sqrt(dx * dx + dy * dy);
          
          if (distToMouse < 210 && distToMouse > 0.1) {
            const force = (210 - distToMouse) / 210;
            const angleToMouse = Math.atan2(dy, dx);
            const pushX = Math.cos(angleToMouse) * force * 1.7;
            const pushY = Math.sin(angleToMouse) * force * 1.7;
            this.vx += pushX * 0.048;
            this.vy += pushY * 0.048;
          }

          this.x += this.vx;
          this.y += this.vy;
          
          this.vx *= 0.996;
          this.vy *= 0.996;

          if (this.x < -30) this.x = width + 30;
          if (this.x > width + 30) this.x = -30;
          if (this.y < -30) this.y = height + 30;
          if (this.y > height + 30) this.y = -30;

          this.angle += this.speedFactor;
          this.radius = this.baseRadius + Math.sin(this.angle + time * 0.018) * 0.9;
          
          this.currentAlpha = this.alpha + Math.sin(this.angle * 1.7 + time * 0.02) * 0.1;
          this.currentAlpha = Math.min(0.85, Math.max(0.12, this.currentAlpha));
        }

        draw(ctx) {
          ctx.beginPath();
          ctx.fillStyle = `rgba(${this.gray}, ${this.gray}, ${this.gray}, ${this.currentAlpha})`;
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fill();
          
          if (this.radius > 2.1) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius * 1.8, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${this.gray}, ${this.gray}, ${this.gray}, 0.09)`;
            ctx.fill();
          }
        }
      }

      function createParticles(count) {
        particles.length = 0;
        for (let i = 0; i < count; i++) {
          particles.push(new Particle());
        }
      }

      function drawConnections(ctx, particlesList, time) {
        const maxDist = 140;
        const baseAlpha = 0.18;
        
        for (let i = 0; i < particlesList.length; i++) {
          for (let j = i + 1; j < particlesList.length; j++) {
            const p1 = particlesList[i];
            const p2 = particlesList[j];
            const dx = p1.x - p2.x;
            const dy = p1.y - p2.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < maxDist) {
              const opacity = (1 - dist / maxDist) * baseAlpha * 2.0;
              const dynamicGray = 180 + Math.sin(time * 0.025 + i * 0.15) * 25;
              ctx.beginPath();
              ctx.moveTo(p1.x, p1.y);
              ctx.lineTo(p2.x, p2.y);
              ctx.strokeStyle = `rgba(${dynamicGray}, ${dynamicGray}, ${dynamicGray}, ${opacity})`;
              ctx.lineWidth = 0.8 * (1 - dist / maxDist) + 0.25;
              ctx.stroke();
            }
          }
        }
      }

      function drawBackgroundShapes(ctx, time) {
        ctx.save();
        const shapes = [
          { x: width * 0.25, y: height * 0.35, radX: 180, radY: 160, alpha: 0.045, speed: 0.0009 },
          { x: width * 0.75, y: height * 0.65, radX: 210, radY: 190, alpha: 0.055, speed: -0.001 },
          { x: width * 0.5, y: height * 0.5, radX: 250, radY: 230, alpha: 0.035, speed: 0.0007 }
        ];
        
        shapes.forEach(s => {
          const driftX = Math.sin(time * s.speed * 2.0) * 42;
          const driftY = Math.cos(time * s.speed * 1.4) * 42;
          ctx.beginPath();
          ctx.ellipse(s.x + driftX, s.y + driftY, s.radX, s.radY, 0, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(195, 195, 195, ${s.alpha})`;
          ctx.fill();
        });
        ctx.restore();
      }

      let animationFrameId;
      let time = 0;

      function animate() {
        time++;
        
        mouseX += (targetMouseX - mouseX) * 0.13;
        mouseY += (targetMouseY - mouseY) * 0.13;
        
        ctx.clearRect(0, 0, width, height);
        
        drawBackgroundShapes(ctx, time);
        
        for (let p of particles) {
          p.update(mouseX, mouseY, time);
          p.draw(ctx);
        }
        
        drawConnections(ctx, particles, time);
        
        animationFrameId = requestAnimationFrame(animate);
      }

      function setupBackground() {
        resizeCanvas();
        createParticles(PARTICLE_COUNT);
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        animate();
      }

      window.addEventListener('resize', () => {
        resizeCanvas();
        createParticles(PARTICLE_COUNT);
      });

      window.addEventListener('mousemove', onMouseMove);
      window.addEventListener('touchmove', onTouchMove, { passive: true });
      window.addEventListener('touchstart', onTouchStart, { passive: true });

      // Остановка аудио при уходе со страницы
      window.addEventListener('beforeunload', () => {
        stopCurrentAudio();
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        window.removeEventListener('mousemove', onMouseMove);
      });

      // Запуск
      initializeContent();
      setupBackground();
    })();
  </script>
</body>
</html>
